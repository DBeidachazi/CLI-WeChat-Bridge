services:
  cli-wechat-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./scripts/start-bridge.sh"]
    env_file:
      - ./.env
    user: "0:0"
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
      - cli-wechat-bridge-node-modules:/app/node_modules
      - ./home:/root
    networks:
      - openclaw-net

networks:
  openclaw-net:
    external: true

volumes:
  cli-wechat-bridge-node-modules:
