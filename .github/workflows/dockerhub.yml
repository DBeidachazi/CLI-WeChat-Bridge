name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/dockerhub.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "bun.lock"
      - "README.md"
      - "bin/**"
      - "scripts/**"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dockerhub-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME || 'cli-wechat-bridge' }}

jobs:
  dockerhub:
    runs-on: ubuntu-latest

    steps:
      - name: Check required DockerHub settings
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || { echo "::error::Missing DOCKERHUB_USERNAME secret"; exit 1; }
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || { echo "::error::Missing DOCKERHUB_TOKEN secret"; exit 1; }

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=dockerhub
            type=registry,ref=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=gha,scope=dockerhub,mode=max,ignore-error=true
            type=registry,ref=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
